version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runner
    ports:
      - "5000:5000"
    volumes:
      - ./backend/data:/app/backend/data
    environment:
      - JWT_SECRET=production-secret-key-change-me

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runner
    ports:
      - "3000:3000"
    depends_on:
      - backend
