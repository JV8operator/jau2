services:
  - type: web
    name: jau2-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://jau2.vercel.app
      - key: PYTHON_VERSION
        value: "3.10.12"
    rootDir: .
